<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master AI - Gemini Direct</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        #header { background: #111; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; color: #00d4ff; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 15px; border-radius: 15px; max-width: 80%; }
        .user { background: #333; align-self: flex-end; }
        .ai { background: #1a1a1a; align-self: flex-start; border-right: 4px solid #00d4ff; color: #00d4ff; }
        #input-container { padding: 15px; background: #111; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; background: #000; color: white; border: 1px solid #444; }
        button { padding: 10px 20px; border-radius: 20px; background: #00d4ff; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">ماستر</div>
    <div id="chat-area"><div class="message ai">يا بعد حيي، أنا جاهز. الحين بانتظار الربط بـ API Key عشان أكلمك مباشرة.</div></div>
    <div id="input-container">
        <input type="text" id="userInput" placeholder="اسأل ماستر...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        // هنا تحط الـ API Key حقك بعد ما تجيبه من Google AI Studio
        const API_KEY = "حط_المفتاح_هنا"; 

        async function sendMessage() {
            let input = document.getElementById("userInput");
            let chat = document.getElementById("chat-area");
            if (input.value.trim() === "") return;

            chat.innerHTML += `<div class="message user">${input.value}</div>`;
            let userText = input.value;
            input.value = "";

            try {
                // الربط المباشر بـ Gemini
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });

                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;

                chat.innerHTML += `<div class="message ai">${aiReply}</div>`;
            } catch (error) {
                chat.innerHTML += `<div class="message ai">يا بعد حيي، تأكد من الـ API Key أو الاتصال بالنت. ما قدرت أوصل لـ Gemini.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
