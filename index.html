<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master AI Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 15px; border-radius: 15px; max-width: 80%; }
        .ai { background: #1a1a1a; align-self: flex-start; border-right: 4px solid #00d4ff; color: #00d4ff; }
        .user { background: #333; align-self: flex-end; }
        #input-container { padding: 15px; background: #111; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; background: #000; color: white; border: 1px solid #444; }
        button { padding: 10px 20px; border-radius: 20px; background: #00d4ff; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-area"><div class="message ai">يا بعد حيي، أنا جاهز. اكتب لي أي شيء وأنا بكلم Gemini مباشرة.</div></div>
    <div id="input-container">
        <input type="text" id="userInput" placeholder="سولف مع ماستر...">
        <button onclick="send()">إرسال</button>
    </div>

    <script>
        const API_KEY = "حط_المفتاح_هنا_يا_بطل";

        async function send() {
            let input = document.getElementById("userInput");
            let chat = document.getElementById("chat-area");
            if (!input.value.trim()) return;

            chat.innerHTML += `<div class="message user">${input.value}</div>`;
            let userQuery = input.value;
            input.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userQuery }] }] })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="message ai">${reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="message ai">يا بعد راسي، صار خطأ في الاتصال (شيك الـ Console عشان تعرف السبب).</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
