<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Master AI Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.1.3/dist/index.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 15px; border-radius: 15px; max-width: 80%; }
        .ai { background: #1a1a1a; align-self: flex-start; border-right: 4px solid #00d4ff; color: #00d4ff; }
        .user { background: #333; align-self: flex-end; }
        #input-container { padding: 15px; background: #111; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; background: #000; color: white; border: 1px solid #444; }
        button { padding: 10px 20px; border-radius: 20px; background: #00d4ff; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-area"><div class="message ai">هلا يا بعد حيي، الأداة جاهزة. عطني مفتاحك (API Key) وأنا بشتغل فوراً.</div></div>
    <div id="input-container">
        <input type="text" id="userInput" placeholder="اسأل ماستر...">
        <button onclick="send()">إرسال</button>
    </div>

    <script>
        // هنا حط الـ API KEY حقك
        const API_KEY = "حط_المفتاح_هنا"; 
        
        async function send() {
            const input = document.getElementById("userInput");
            const chat = document.getElementById("chat-area");
            if (!input.value.trim()) return;

            chat.innerHTML += `<div class="message user">${input.value}</div>`;
            const prompt = input.value;
            input.value = "";

            try {
                // استخدام الأداة اللي حملناها فوق
                const genAI = new (window.generativeai.GoogleGenerativeAI)(API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(prompt);
                const response = await result.response;
                chat.innerHTML += `<div class="message ai">${response.text()}</div>`;
            } catch (err) {
                chat.innerHTML += `<div class="message ai">يا بعد حيي، فيه مشكلة بالأداة أو المفتاح. شيك الـ Console.</div>`;
                console.error(err);
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
